<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mixo Aromatique — Katalog</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --black:#0F0F0F;--dark:#1C1C1C;--muted:#888;--light:#C8C8C8;
  --border:#E4E4E4;--surface:#F9F9F7;--white:#FFFFFF;
  --fresh:#2A5A4A;--fresh-bg:#EAF2EE;
  --floral:#5A2A5A;--floral-bg:#F2EAF2;
  --woody:#5A3A1A;--woody-bg:#F2EAE0;
  --oriental:#3A2A6A;--oriental-bg:#EAE8F4;
  --gourmand:#5A2A1A;--gourmand-bg:#F4EAE8;
  --aquatic:#1A3A5A;--aquatic-bg:#E8EEF4;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--surface);color:var(--dark);font-family:'Barlow',sans-serif;min-height:100vh}

/* HERO */
.hero{background:var(--black);position:relative;overflow:hidden}
.hero-pat{position:absolute;inset:0;opacity:0.04;background-image:repeating-linear-gradient(0deg,transparent,transparent 40px,#fff 40px,#fff 41px),repeating-linear-gradient(90deg,transparent,transparent 40px,#fff 40px,#fff 41px)}
.hero-in{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;text-align:center;padding:52px 24px 44px}
.hero-rule{width:40px;height:1px;background:rgba(255,255,255,0.3);margin:0 auto 20px}


.hero-title em{font-style:italic;color:rgba(255,255,255,0.75)}
.hero-tag{font-size:12px;font-weight:300;letter-spacing:0.12em;color:rgba(255,255,255,0.4);margin-bottom:28px;text-transform:uppercase}
.hero-meta{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.hero-meta span{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.06em}

/* CONTROLS */
.controls{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.search-bar{padding:12px 20px;border-bottom:1px solid var(--border)}
.search-in{max-width:700px;margin:0 auto;position:relative}
.s-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--muted)}
#srch{width:100%;padding:10px 14px 10px 38px;font-size:13px;font-family:'Barlow',sans-serif;border:1px solid var(--border);border-radius:6px;outline:none;background:var(--surface);color:var(--dark);transition:border-color .2s}
#srch:focus{border-color:var(--dark);background:#fff}
#srch::placeholder{color:var(--muted)}

.frow{overflow-x:auto;scrollbar-width:none;padding:0 16px;border-bottom:1px solid var(--border)}
.frow:last-child{border-bottom:none}
.frow::-webkit-scrollbar{display:none}
.tinner{display:flex;min-width:max-content}
.tab{font-size:11px;font-weight:500;letter-spacing:0.07em;text-transform:uppercase;padding:10px 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;font-family:'Barlow',sans-serif;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.tab:hover{color:var(--dark)}
.tab.on{color:var(--dark);border-bottom-color:var(--dark)}
.tab .si{width:11px;height:11px;flex-shrink:0}

/* ACTIVE FILTER STRIP */
.af-strip{padding:6px 20px;background:#F4F4F2;border-bottom:1px solid var(--border);display:none;align-items:center;gap:6px;flex-wrap:wrap}
.af-strip.show{display:flex}
.af-lbl{font-size:10px;color:var(--muted)}
.af-tag{font-size:10px;font-weight:600;padding:3px 10px;background:var(--dark);color:#fff;border-radius:2px;text-transform:uppercase;display:inline-flex;align-items:center;gap:4px;cursor:pointer}
.af-tag svg{width:8px;height:8px;opacity:.7}
.af-clr{font-size:10px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:2px;margin-left:4px}

/* STATS */
.stats{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:var(--black);flex-wrap:wrap;gap:6px}
.stat-c{font-size:11px;font-weight:500;letter-spacing:0.08em;color:rgba(255,255,255,0.6);text-transform:uppercase}
.stat-h{font-size:11px;color:rgba(255,255,255,0.35)}

/* GRID */
.grid-wrap{max-width:1020px;margin:0 auto;padding:20px 20px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

/* CARD */
.card{background:var(--white);border:1px solid var(--border);border-radius:2px;overflow:hidden;display:flex;flex-direction:column;transition:transform .18s,box-shadow .18s;position:relative}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,0.1)}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.card.c-bs::after{background:var(--black)}
.card.c-vip::after{background:#999}
.card.c-vvip::after{background:var(--black)}

/* CARD VISUAL */
.cvis{height:160px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;cursor:pointer}
.bg-fresh{background:#E8F4F0;--icon-c:#2A5A4A}
.bg-floral{background:#F4EAF4;--icon-c:#5A2A5A}
.bg-woody{background:#F4EDE4;--icon-c:#5A3A1A}
.bg-oriental{background:#ECEAF6;--icon-c:#3A2A6A}
.bg-gourmand{background:#F5EAE6;--icon-c:#5A2A1A}
.bg-aquatic{background:#E6EEF6;--icon-c:#1A3A5A}
.cbadges{position:absolute;top:10px;left:10px;display:flex;flex-direction:column;gap:4px;z-index:2}
.cb{font-size:9px;font-weight:600;letter-spacing:0.08em;padding:2px 7px;text-transform:uppercase;border-radius:1px}
.cb-bs{background:var(--black);color:#fff}
.cb-vip{background:#666;color:#fff}
.cb-vvip{background:var(--dark);color:#fff}
.bottle-icon{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.bottle-icon svg{height:108px;width:auto;opacity:0.5}

/* CARD BODY */
.cbody{padding:14px 16px;flex:1;display:flex;flex-direction:column}
.cname{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:500;letter-spacing:0.03em;color:var(--black);line-height:1.2;margin-bottom:6px}
.cchips{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.chip{font-size:9px;font-weight:500;letter-spacing:0.06em;padding:2px 7px;border-radius:1px;text-transform:uppercase}
.chip-fresh{background:var(--fresh-bg);color:var(--fresh)}
.chip-floral{background:var(--floral-bg);color:var(--floral)}
.chip-woody{background:var(--woody-bg);color:var(--woody)}
.chip-oriental{background:var(--oriental-bg);color:var(--oriental)}
.chip-gourmand{background:var(--gourmand-bg);color:var(--gourmand)}
.chip-aquatic{background:var(--aquatic-bg);color:var(--aquatic)}
.chip-w{background:#F8F0F8;color:#5A1A5A}
.chip-m{background:#EEF2F8;color:#1A3060}
.chip-u{background:#EEF6EE;color:#1A5A2A}

/* NOTES */
.notes{flex:1;margin-bottom:10px}
.nrow{display:flex;gap:6px;margin-bottom:3px;align-items:baseline}
.nlbl{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--light);width:36px;flex-shrink:0}
.nval{font-size:11px;color:var(--muted);line-height:1.4}
.when{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:3px 8px;border-radius:1px;margin-top:6px}
.when-d{background:#EAF4EE;color:#2A5A3A}
.when-n{background:#EEEAF4;color:#3A2A6A}
.when-b{background:#F4F0EA;color:#5A4A2A}

/* CARD FOOTER */
.cfoot{display:flex;align-items:flex-end;justify-content:space-between;padding-top:10px;border-top:1px solid var(--border)}
.cprice{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:500;color:var(--black);line-height:1}
.cunit{font-size:9px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px}
.cnum{font-size:11px;color:var(--light);font-family:'Barlow',sans-serif;font-weight:300;letter-spacing:0.05em}

/* WA BUTTON */
.btn-wa{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:9px;background:var(--black);color:#fff;border:none;border-radius:2px;cursor:pointer;font-family:'Barlow',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;margin-top:8px;transition:opacity .15s}
.btn-wa:hover{opacity:.8}
.btn-wa svg{width:14px;height:14px;flex-shrink:0}

/* EMPTY */
.empty{grid-column:1/-1;text-align:center;padding:80px 20px}
.empty p{font-family:'Cormorant Garamond',serif;font-size:22px;font-style:italic;color:var(--muted)}

/* FOOTER */
.foot{background:var(--black);padding:40px 24px;text-align:center}
.foot-logo{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;letter-spacing:0.05em;color:#fff;letter-spacing:.02em}
.foot-logo span{color:rgba(255,255,255,.6);font-weight:400}
.foot-rule{width:30px;height:1px;background:rgba(255,255,255,.2);margin:16px auto}
.foot-info{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.1em;line-height:2}

.fade{animation:fadeUp .25s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:500px){.grid{grid-template-columns:repeat(2,1fr);gap:10px}.cvis{height:120px}.bottle-icon svg{height:80px}}
</style>
</head>

function render(){
  const q=document.getElementById("srch").value.toLowerCase().trim();
  const list=P.filter(d=>{
    const mq=!q||d.n.toLowerCase().includes(q)||d.cat.includes(q)||d.top.toLowerCase().includes(q)||d.mid.toLowerCase().includes(q)||d.base.toLowerCase().includes(q);
    const mt=aTier==="all"||(aTier==="bs"&&d.bs>0)||(aTier==="vip"&&d.t===2)||(aTier==="vvip"&&d.t===3);
    const mg=aGender==="all"||d.f===aGender;
    const mc=aCat==="all"||d.cat===aCat;
    return mq&&mt&&mg&&mc;
  });

  if(aTier==="bs") list.sort((a,b)=>a.bs-b.bs);
  else list.sort((a,b)=>{
    if(a.bs>0&&b.bs<=0) return -1;
    if(b.bs>0&&a.bs<=0) return 1;
    return a.n.localeCompare(b.n);
  });

  document.getElementById("count").textContent=list.length+" parfum tersedia";
  const g=document.getElementById("grid");

  if(!list.length){
    g.innerHTML='<div class="empty"><p>Parfum tidak ditemukan...</p></div>';
    return;
  }

  g.innerHTML=list.map(function(d,i){
    const cc=d.t===3?"card c-vvip":d.t===2?"card c-vip":"card c-bs";

      +'<div class="cvis '+(catBg[d.cat]||"bg-floral")+'">'

'<div class="cbody">'
